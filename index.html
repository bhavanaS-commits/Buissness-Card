<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #ffffff;
            width: 360px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            text-align: center;
            padding: 20px;
        }
        .card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }
        .card h2 {
            margin: 5px 0;
            color: #333;
        }
        .card h4 {
            margin: 5px 0 15px;
            color: #777;
            font-weight: normal;
        }
        .info {
            font-size: 14px;
            color: #555;
            line-height: 1.8;
        }

        .info span {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="profile.jpg" alt="Profile">
        <h2>Bhavana S</h2>
        <h4>MRDU Student CSE(AIML) 1st Year</h4>
        <div class="info">
            <div><span>📞Phone: </span>9391936439</div>
            <div><span>📩Email: </span>bhavana.s.seelamnarasimhareddy@gamil.com</div>
        </div>
    </div>
</body>
</html>
